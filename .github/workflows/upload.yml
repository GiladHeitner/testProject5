name: Auto Generate & Upload Short

on:
  repository_dispatch:
    types: [trigger-shorts] # This is your custom "button" name
  workflow_dispatch:
  schedule:
    # ~10am PT and ~6pm PT (UTC); small jitter step below
    - cron: "0 18 * * *"
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      HF_HOME: ~/.cache/huggingface
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg sox fonts-dejavu-core

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch torchaudio
          python -m pip install -r requirements.txt

      # Gameplay lives on Google Drive (not Git LFS) to avoid LFS bandwidth limits.
      - name: Download gameplay from Google Drive
        run: |
          . .venv/bin/activate
          python -m pip install -q gdown
          mkdir -p assets/gameplay
          gdown "https://drive.google.com/file/d/1Pnu2sFDpScya5Odj070_pFYXyV61rKU3/view?usp=sharing" \
            -O assets/gameplay/minecraft_parkour.mov
          # Roblox (disabled for now — re-enable for random Minecraft/Roblox mix):
          # gdown "https://drive.google.com/file/d/1MXK-sRRbqt0sHNFwCwkGVIESF_FJAuH7/view?usp=sharing" \
          #   -O assets/gameplay/roblox_part00.mov
          # gdown "https://drive.google.com/file/d/1oTBGA9dGH4jyGPJYqhWYj8b0mUYxYj7p/view?usp=sharing" \
          #   -O assets/gameplay/roblox_part01.mov
          ls -lh assets/gameplay/

      - name: Cache Hugging Face model files
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-qwen-tts-v1
          restore-keys: |
            ${{ runner.os }}-qwen-tts-

      - name: Materialize required auth files from secrets
        env:
          YT_CLIENT_SECRET_JSON: ${{ secrets.YT_CLIENT_SECRET_JSON }}
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$YT_CLIENT_SECRET_JSON" ] || [ -z "$YT_TOKEN_JSON" ] || [ -z "$OPENAI_API_KEY" ]; then
            echo "Missing one or more required secrets: YT_CLIENT_SECRET_JSON, YT_TOKEN_JSON, OPENAI_API_KEY"
            exit 1
          fi
          printf '%s' "$YT_CLIENT_SECRET_JSON" > client_secret.json
          printf '%s' "$YT_TOKEN_JSON" > youtube_token.json
          if [ ! -s client_secret.json ] || [ ! -s youtube_token.json ]; then
            echo "Secret materialization failed (empty JSON file). Re-save your secrets."
            exit 1
          fi
          python -m json.tool client_secret.json >/dev/null
          python -m json.tool youtube_token.json >/dev/null
          printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY" > .env

      - name: Short jitter before generate
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 900))
          echo "Sleeping ${DELAY}s (up to 15 min jitter)..."
          sleep "$DELAY"

      - name: Generate and upload short
        env:
          CI: "true"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          WIKIMEDIA_USER_AGENT_CONTACT: ${{ secrets.WIKIMEDIA_USER_AGENT_CONTACT }}
        run: ./run.sh --reddit-topic

      - name: Save used topic
        run: |
          mkdir -p .github
          touch .github/used_reddit.txt .github/used_topics.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/used_reddit.txt .github/used_topics.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: track used Reddit post"
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git pull --rebase origin main || true
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push rejected, retrying ($attempt/5)..."
            sleep 5
          done
          echo "Failed to push used-topic state after retries."
          exit 1
